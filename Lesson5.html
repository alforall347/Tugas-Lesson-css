<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
.new {
    color: sandybrown;
    margin: 0 auto;
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
}
.mac {
    color: black;
    margin: 0 auto;
    text-align: center;
    font-size: 25px;
    font-weight: bold;
    font-family: Arial, Helvetica, sans-serif;
}
.big {
    color: black;
    margin: 0 auto;
    text-align: center;
    font-size: 40px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
}
.price {
    color: black;
    margin: 0 auto;
    text-align: center;
    font-size: 20px;
    font-family: Arial, Helvetica, sans-serif;
}
.wrap {
  text-align: center;
}

.btn2 {
  display: inline-block;
  background-color: rgb(78, 78, 244);
  color: white;
  padding: 5px 10px;
  border-radius: 20px;
  text-decoration: none;
}
.price2 {
  font-size: 30px;
  font-family: Arial, sans-serif;
  text-align: left;
}

.usd {
  font-size: 14px;
  color: gray;
}

.up {
  color: green;
  text-align: left;
  margin: 0;
}

.after {
  color: gray;
  text-align: left;
}

.down {
  color: red;
}

</style>

</head>
<body>
    
<p class="new">New</p>
<p class="mac">MacBook Pro</p>
<p class="big">Supercharged for pros.</p>
<br>
<p class="price">From $1999</p>
<br>
<div class="wrap">
  <a class="btn2">Buy</a>
<br><br><br><br>
<p class="price2">
  1,049.61 <span class="usd">USD</span>
</p>
<p class="up"> +18.05 (1.75%) today</p>
<p class="after">
  After hours 1,048.00 
  <span class="down">-1.61 (0.15%)</span>
</p>

</div>







</body>
</html>
