<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 12 - Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>12a</h2>
    <div class="flex-12a">
        <div class="item">200px</div>
        <div class="item">75px</div>
    </div>
    <br>
    <h2>12b</h2>
    <div class="flex-12b">
        <div class="item">item1</div>
        <div class="item">item2</div>
        <div class="item">item3</div>
    </div>
    <br>
    <h2>12c</h2>
    <div class="flex-12c">
        <div class="item">item1</div>
        <div class="item">item2</div>
        <div class="item">item3</div>
        <div class="item">item4</div>
    </div>
    <br>
    <h2>12d</h2>
    <div class="flex-12d">
        <div class="item">item1</div>
        <div class="item">item2</div>
    </div>
<h2>12e</h2>
    <div class="flex-12e">
        <div class="menu-item">
            <span>Home</span>
            <span class="angka">14</span>
        </div>
        <div class="menu-item">
            <span>Notifications</span>
            <span class="angka">3</span>
        </div>
        <div class="menu-item">
            <span>Messages</span>
            <span class="angka">5</span>
        </div>
    </div>
<br>
    <h2>12f</h2>
    <div class="flex-12f">
        <span class="teks">Home</span>
        <input type="text" class="kolom-cari" placeholder="Search">
        <button class="tombol-unduh">Download</button>
    </div>
<br>
    <h2>12g</h2>
    <div class="wadah-12g">
        <div class="profil-item">
            <img src="oliver.jpg" alt="Oliver" class="foto">
            <div class="info">
                <div class="nama">oliver</div>
                <div class="keterangan">the cat</div>
                <div class="tag">Popular</div>
            </div>
            <button class="tombol-ikuti">Follow</button>
        </div>

        <div class="profil-item">
            <img src="mimi.jpg" alt="Mimi" class="foto">
            <div class="info">
                <div class="nama">Mimi</div>
                <div class="keterangan">Sleepy Cat</div>
                <div class="tag">Popular</div>
            </div>
            <button class="tombol-ikuti">Follow</button>
        </div>

        <div class="profil-item">
            <img src="rex.jpg" alt="Rex" class="foto">
            <div class="info">
                <div class="nama">Rex</div>
                <div class="keterangan">Happy Bulldog</div>
                <div class="tag">Popular</div>
            </div>
            <button class="tombol-ikuti">Follow</button>
        </div>
    </div>


</body>
</html>
